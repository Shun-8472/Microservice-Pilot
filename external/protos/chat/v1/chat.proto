syntax = "proto3";

package chat.v1;
option go_package = "mini/external/protos/chat/v1;chatv1";

service ChatService {
  rpc GenerateMessage (ChatRequest) returns (ChatResponse);
  rpc StreamMessage (ChatRequest) returns (stream ChatResponse);
}

message ChatRequest {
  string user_input = 1;
  string session_id = 2;
  string user_id = 3;
  bool return_tool_results = 4;
}

enum ChatResponseType {
  CHAT_RESPONSE_TYPE_UNSPECIFIED = 0;
  CHAT_RESPONSE_TYPE_STATUS = 1;
  CHAT_RESPONSE_TYPE_TOOL_RESULT = 2;
  CHAT_RESPONSE_TYPE_FINAL = 3;
}

message ToolExecutionResult {
  string tool_name = 1;
  string tool_input = 2;
  string tool_output = 3;
  bool success = 4;
}

message ChatResponse {
  string response = 1;
  string session_id = 2;
  int64 turn_id = 3;
  ChatResponseType type = 4;
  repeated ToolExecutionResult tool_results = 5;
  repeated string response_lines = 6;
}
